name: "CI / CD"

on:
  push:
    branches: [ "main", "feature/*", "bugfix/*" ]
    paths-ignore:
      - '.github/**.yml'
      - '!.github/workflows/ci.yml'

  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '.github/**.yml'
      - '!.github/workflows/ci.yml'

  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg,readwrite"

jobs:
  strings:
    runs-on: ubuntu-latest
    outputs:
      build-dir: ${{ steps.strings.outputs.build-dir }}
      build-version: ${{ steps.strings.outputs.build-version }}
    steps:
      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-dir=build" >> "$GITHUB_OUTPUT"
          COMMIT_HASH=${{ github.sha }}
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
          [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')
          [ "$VERSION" == "${{ github.event.repository.default_branch }}" ] && VERSION=latest
          VERSION="$VERSION+sha.${COMMIT_HASH:0:8}"
          echo VERSION=$VERSION
          echo "build-version=${VERSION}" >> "$GITHUB_OUTPUT"

  build-test-package:
    needs: [ strings ]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, ubuntu-latest, windows-latest, windows-2025-vs2026, macos-latest ]
        preset: [ ci ]
        include:
          - os: ubuntu-latest
            preset: ci-x64-linux-dynamic
    steps:
      - name: Dependencies ${{ runner.os }}
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install --yes \
            autoconf \
            autoconf-archive \
            automake \
            libtool

      - name: Dependencies ${{ runner.os }}
        if: runner.os == 'Windows'
        run: >
          choco install
          nsis

      - name: Dependencies ${{ runner.os }}
        if: runner.os == 'macOS'
        run: >
          brew install
          autoconf
          autoconf-archive
          automake
          libtool

      - uses: actions/checkout@v6

      - uses: lukka/get-cmake@latest

      - uses: lukka/run-vcpkg@v11.6
        with:
          vcpkgConfigurationJsonGlob: "vcpkg-configuration.json"

      - uses: actions/cache/restore@v5
        id: vcpkg-cache
        with:
          path: ${{ github.workspace }}/.vcpkg
          key: vcpkg-${{ matrix.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: vcpkg-${{ matrix.os }}-


      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}

      - uses: actions/cache/save@v5
        if: ( ! cancelled() && steps.vcpkg-cache.outputs.cache-hit != 'true')
        with:
          path: ${{ github.workspace }}/.vcpkg
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build
        run: cmake --build ${{ needs.strings.outputs.build-dir }}/ci --config Debug

      - name: Test
        run: ctest --preset ci

      - name: Package
        run: cpack --preset ci -R "${{ needs.strings.outputs.build-version }}"

      - uses: actions/upload-artifact@v7
        with:
          name: learning-vcpkg-${{ matrix.os }}-${{ matrix.preset }}-${{ needs.strings.outputs.build-version }}
          path: ${{ needs.strings.outputs.build-dir }}/ci/learning-vcpkg-*
          if-no-files-found: error

  test-comsume-component:
    needs: [ strings, build-test-package ]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]
        component: [ hello-world, example ]
    steps:
      - name: Dependencies ${{ runner.os }}
        run: |
          sudo apt update
          sudo apt install --yes \
            autoconf \
            autoconf-archive \
            automake \
            libtool

      - uses: actions/checkout@v6

      - uses: lukka/get-cmake@latest

      - uses: lukka/run-vcpkg@v11.6
        with:
          vcpkgConfigurationJsonGlob: "**/usage//consume-component-${{ matrix.component }}/vcpkg-configuration.json"

      - uses: actions/download-artifact@v8
        with:
          pattern: learning-vcpkg-${{ matrix.os }}-ci-${{ needs.strings.outputs.build-version }}
          merge-multiple: true
          path: usage/consume-component-${{ matrix.component }}/${{ needs.strings.outputs.build-dir }}

      - name: Install package
        working-directory: ${{ github.workspace }}/usage/consume-component-${{ matrix.component }}
        run: >
          find ${{ needs.strings.outputs.build-dir }} &&
          sh ${{ needs.strings.outputs.build-dir }}/learning-vcpkg-*.sh
          --skip-license
          --include-subdir
          --prefix=${{ needs.strings.outputs.build-dir }}/install

      - name: Configure CMake
        working-directory: ${{ github.workspace }}/usage/consume-component-${{ matrix.component }}
        run: cmake --workflow ci
